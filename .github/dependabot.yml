version: 2
updates:
  # TypeScript stacks — minor/patch only (major bumps like TS 5->6 break the build)
  - package-ecosystem: "npm"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Go x402 feed server + facilitator (keep majors so security fixes flow)
  - package-ecosystem: "gomod"
    directory: "/x402/feeds"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions — minor/patch only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
